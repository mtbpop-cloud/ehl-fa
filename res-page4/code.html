<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>お客様情報 - ehl:fa</title>

        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#b28acc",
                    "on-secondary": "#ffffff",
                    "surface-container-highest": "#e6e2df",
                    "on-tertiary-fixed-variant": "#5a3873",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#ff92b2",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed": "#2c0844",
                    "on-primary-container": "#c48d78",
                    "tertiary-container": "#44225c",
                    "tertiary": "#2d0a46",
                    "primary-fixed-dim": "#f5b9a2",
                    "on-surface-variant": "#51443f",
                    "tertiary-fixed-dim": "#e1b7fc",
                    "outline": "#84746e",
                    "on-tertiary": "#ffffff",
                    "surface-tint": "#815340",
                    "outline-variant": "#d6c3bc",
                    "inverse-surface": "#32302e",
                    "surface-container-high": "#ece7e4",
                    "surface-variant": "#e6e2df",
                    "on-primary": "#ffffff",
                    "secondary-fixed-dim": "#ffb1c5",
                    "on-primary-fixed": "#321205",
                    "on-surface": "#1d1b1a",
                    "primary": "#331406",
                    "primary-container": "#4d2818",
                    "background": "#fef8f5",
                    "inverse-on-surface": "#f5f0ed",
                    "surface-container-low": "#f8f3f0",
                    "surface-container": "#f2edea",
                    "on-primary-fixed-variant": "#663c2b",
                    "inverse-primary": "#f5b9a2",
                    "on-secondary-fixed": "#3f001b",
                    "surface-dim": "#ded9d6",
                    "on-secondary-fixed-variant": "#7c2846",
                    "tertiary-fixed": "#f3daff",
                    "on-secondary-container": "#7a2744",
                    "surface": "#fef8f5",
                    "error-container": "#ffdad6",
                    "error": "#ba1a1a",
                    "on-background": "#1d1b1a",
                    "secondary": "#9a405d",
                    "on-error-container": "#93000a",
                    "surface-bright": "#fef8f5",

            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Noto Serif JP", "serif"],
                    "display": ["Noto Serif JP", "serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col">
<!-- TopNavBar -->
<header class="fixed top-0 w-full z-50 bg-[#fef8f5]/80 dark:bg-stone-900/80 backdrop-blur-xl">
<div class="flex justify-between items-center px-10 h-24 max-w-full mx-auto">
<div class="text-2xl font-serif font-semibold text-[#331406] dark:text-stone-50 tracking-tighter">ehl:fa</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-[#d6c3bc] dark:text-stone-500 font-medium hover:text-[#9a405d] transition-all duration-500 scale-98-on-click" href="#">スタイリスト</a>
<a class="text-[#d6c3bc] dark:text-stone-500 font-medium hover:text-[#9a405d] transition-all duration-500 scale-98-on-click" href="#">サービス</a>
<a class="text-[#d6c3bc] dark:text-stone-500 font-medium hover:text-[#9a405d] transition-all duration-500 scale-98-on-click" href="#">スケジュール</a>
<a class="text-[#4D2818] dark:text-stone-100 font-bold border-b-2 border-[#4D2818] pb-1 hover:text-[#9a405d] transition-all duration-500 scale-98-on-click" href="#">詳細情報</a>
<a class="text-[#d6c3bc] dark:text-stone-500 font-medium hover:text-[#9a405d] transition-all duration-500 scale-98-on-click" href="#">確認</a>
</nav>
<button class="hidden md:flex items-center gap-2 text-[#4D2818] font-medium hover:text-[#9a405d] transition-colors">
<span>予約の確認</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-32 pb-40 md:pb-24 px-6 md:px-12 max-w-4xl mx-auto w-full">
<!-- Progress Indication -->
<div class="mb-12">
<p class="font-label text-sm text-on-surface-variant uppercase tracking-widest mb-2">Step 4 of 5</p>
<h1 class="font-display text-4xl text-primary mb-4">お客様情報</h1>
<p class="font-body text-lg text-on-surface-variant">ご予約を確定するため、お客様の情報をご入力ください。</p>
</div>
<!-- Form Container -->
<div class="bg-surface-container rounded-xl p-8 md:p-12">
<form action="#" class="space-y-10" method="POST">
<!-- Name Fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="space-y-3">
<label class="block font-label text-sm text-on-surface-variant" for="name_kanji">お名前（漢字）</label>
<input class="w-full bg-surface-container-high border-0 rounded-lg py-4 px-4 text-on-surface focus:ring-1 focus:ring-outline-variant transition-shadow text-lg" id="name_kanji" name="name_kanji" placeholder="山田 太郎" type="text"/>
</div>
<div class="space-y-3">
<label class="block font-label text-sm text-on-surface-variant" for="name_kana">お名前（フリガナ）</label>
<input class="w-full bg-surface-container-high border-0 rounded-lg py-4 px-4 text-on-surface focus:ring-1 focus:ring-outline-variant transition-shadow text-lg" id="name_kana" name="name_kana" placeholder="ヤマダ タロウ" type="text"/>
</div>
</div>
<!-- Contact Fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="space-y-3">
<label class="block font-label text-sm text-on-surface-variant" for="phone">電話番号</label>
<input class="w-full bg-surface-container-high border-0 rounded-lg py-4 px-4 text-on-surface focus:ring-1 focus:ring-outline-variant transition-shadow text-lg" id="phone" name="phone" placeholder="090-1234-5678" type="tel"/>
</div>
<div class="space-y-3">
<label class="block font-label text-sm text-on-surface-variant" for="email">メールアドレス</label>
<input class="w-full bg-surface-container-high border-0 rounded-lg py-4 px-4 text-on-surface focus:ring-1 focus:ring-outline-variant transition-shadow text-lg" id="email" name="email" placeholder="your@email.com" type="email"/>
</div>
</div>
<!-- Special Requests -->
<div class="space-y-3">
<label class="block font-label text-sm text-on-surface-variant" for="requests">ご要望（任意）</label>
<textarea class="w-full bg-surface-container-high border-0 rounded-lg py-4 px-4 text-on-surface focus:ring-1 focus:ring-outline-variant transition-shadow text-lg resize-none" id="requests" name="requests" placeholder="スタイリストへのご要望や特記事項がございましたら、ご記入ください..." rows="4"></textarea>
</div>
<!-- Action Button -->
<div class="pt-8 flex justify-end">
<button class="w-full md:w-auto bg-gradient-to-r from-primary to-primary-container text-on-primary font-body font-medium text-lg px-12 py-5 rounded-lg hover:opacity-90 transition-opacity flex items-center justify-center gap-3" type="submit">
                        予約内容を確認する
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 py-6 pb-10 bg-[#fef8f5] dark:bg-stone-900 rounded-t-[2rem] shadow-2xl border-t border-[#f2edea]">
<a class="flex flex-col items-center justify-center text-[#d6c3bc] dark:text-stone-600 px-4 py-2 hover:text-[#9a405d] dark:hover:text-[#9a405d] transition-colors" href="#">
<span class="material-symbols-outlined mb-1">person_search</span>
<span class="font-sans text-[10px] uppercase tracking-[0.15em] font-medium Inter">スタイリスト</span>
</a>
<a class="flex flex-col items-center justify-center text-[#d6c3bc] dark:text-stone-600 px-4 py-2 hover:text-[#9a405d] dark:hover:text-[#9a405d] transition-colors" href="#">
<span class="material-symbols-outlined mb-1">spa</span>
<span class="font-sans text-[10px] uppercase tracking-[0.15em] font-medium Inter">サービス</span>
</a>
<a class="flex flex-col items-center justify-center text-[#d6c3bc] dark:text-stone-600 px-4 py-2 hover:text-[#9a405d] dark:hover:text-[#9a405d] transition-colors" href="#">
<span class="material-symbols-outlined mb-1">calendar_today</span>
<span class="font-sans text-[10px] uppercase tracking-[0.15em] font-medium Inter">スケジュール</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#4D2818] dark:bg-stone-100 text-[#fef8f5] dark:text-[#331406] rounded-full px-5 py-2.5 hover:text-[#9a405d] dark:hover:text-[#9a405d] transition-colors scale-95 duration-150 ease-out" href="#">
<span class="material-symbols-outlined mb-1">edit_note</span>
<span class="font-sans text-[10px] uppercase tracking-[0.15em] font-medium Inter">詳細情報</span>
</a>
<a class="flex flex-col items-center justify-center text-[#d6c3bc] dark:text-stone-600 px-4 py-2 hover:text-[#9a405d] dark:hover:text-[#9a405d] transition-colors" href="#">
<span class="material-symbols-outlined mb-1">verified</span>
<span class="font-sans text-[10px] uppercase tracking-[0.15em] font-medium Inter">確認</span>
</a>
</nav>
</body></html>
